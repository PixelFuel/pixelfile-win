name: Build Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Build Windows
        working-directory: app
        run: flutter build windows --release

      - name: Verify Windows release artifacts
        working-directory: app
        shell: pwsh
        run: |
          $requiredArtifacts = @(
            "build/windows/x64/runner/Release/localsend_app.exe",
            "build/windows/x64/runner/Release/flutter_windows.dll",
            "build/windows/x64/runner/Release/rust_lib_localsend_app.dll",
            "build/windows/x64/runner/Release/localsend_msix_helper.msix",
            "build/windows/x64/runner/Release/data/app.so"
          )
          $missingArtifacts = $requiredArtifacts | Where-Object { -not (Test-Path $_) }
          if ($missingArtifacts.Count -gt 0) {
            throw "Missing Windows release artifacts: $($missingArtifacts -join ', ')"
          }

      - name: Package Windows installer EXE
        shell: pwsh
        run: |
          $workspacePath = $env:GITHUB_WORKSPACE
          $releasePath = Join-Path $workspacePath "app\build\windows\x64\runner\Release"
          $installerPath = Join-Path $workspacePath "app\build\windows\installer"
          $iconPath = Join-Path $workspacePath "app\windows\runner\resources\app_icon.ico"
          $runtimePath = Join-Path $workspacePath "support\build\windows\x64"

          $isccPath = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source
          if (-not $isccPath) {
            $isccPath = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
            if (-not (Test-Path $isccPath)) {
              choco install innosetup --yes --no-progress
            }
          }

          & $isccPath "/DBuildDir=$releasePath" "/DInstallerDir=$installerPath" "/DAppIcon=$iconPath" "/DRuntimeDir=$runtimePath" "support\build\windows\pixelfile_installer.iss"
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup failed with exit code $LASTEXITCODE"
          }

          $installer = Get-ChildItem "app\build\windows\installer\PixelFile-Setup.exe"
          if ($installer.Count -ne 1) {
            throw "Expected exactly one PixelFile installer, found $($installer.Count)"
          }
          Write-Host "Created installer: $($installer.FullName)"

      - name: Upload Windows build
        uses: actions/upload-artifact@v7
        with:
          name: PixelFile-Windows
          path: |
            app/build/windows/x64/runner/Release

      - name: Upload Windows installer EXE
        uses: actions/upload-artifact@v7
        with:
          name: PixelFile-Windows-Installer
          path: app/build/windows/installer/PixelFile-Setup.exe
          if-no-files-found: error
