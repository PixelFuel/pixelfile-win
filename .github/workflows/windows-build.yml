name: Build Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Build Windows
        working-directory: app
        run: flutter build windows --release

      - name: Verify Windows release artifacts
        working-directory: app
        shell: pwsh
        run: |
          $requiredArtifacts = @(
            "build/windows/x64/runner/Release/localsend_app.exe",
            "build/windows/x64/runner/Release/flutter_windows.dll",
            "build/windows/x64/runner/Release/rust_lib_localsend_app.dll",
            "build/windows/x64/runner/Release/localsend_msix_helper.msix",
            "build/windows/x64/runner/Release/data/app.so"
          )
          $missingArtifacts = $requiredArtifacts | Where-Object { -not (Test-Path $_) }
          if ($missingArtifacts.Count -gt 0) {
            throw "Missing Windows release artifacts: $($missingArtifacts -join ', ')"
          }

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: PixelFile-Windows
          path: |
            app/build/windows/x64/runner/Release
